---
- name: Instalación Automática de Nodo Proxy Central
  hosts: all
  become: yes
  tasks:
    - name: FASE 1 - Instalar Docker y herramientas de red
      apt:
        name:
          - docker.io
          - docker-compose
          - python3-pip
          - curl
          - git
        state: present
        update_cache: yes

    - name: FASE 3 - Crear carpetas de persistencia
      file:
        path: "/opt/servicios/nodo-proxy-core/{{ item }}"
        state: directory
        mode: '0755'
      with_items:
        - 'npm_data'
        - 'npm_letsencrypt'

    - name: FASE 4.2 - Pull de la imagen de Proxy
      shell: "docker pull jc21/nginx-proxy-manager:latest"

    - name: FASE 5 - Lanzamiento del servicio
      shell: "cd /opt/servicios/nodo-proxy-core && docker compose up -d"

    - name: FASE 6 - Asegurar permisos en carpetas SSL
      file:
        path: "/opt/servicios/nodo-proxy-core/npm_letsencrypt"
        state: directory
        owner: "1000"
        group: "1000"
        recurse: yes

    - name: FASE 7 - Ejecutar script de certificados locales
      include_tasks: auto_certificados.yml
