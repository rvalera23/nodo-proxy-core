version: '3.8'
services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nodo_proxy_manager
    restart: unless-stopped
    ports:
      - '80:80'   # Tráfico HTTP normal
      - '81:81'   # Panel de Administración (¡Importante!)
      - '443:443' # Tráfico HTTPS seguro
    volumes:
      - ../npm_data:/data
      - ../npm_letsencrypt:/etc/letsencrypt
