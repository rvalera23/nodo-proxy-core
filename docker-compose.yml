version: '3.8'
services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nodo_proxy_manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ../npm_data:/data
      - ../npm_letsencrypt:/etc/letsencrypt

networks:
  default:
    name: nodo_proxy_network
