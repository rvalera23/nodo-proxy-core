version: '3.8'
services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nodo_proxy_manager
    restart: unless-stopped
    ports:
      - '80:80'   # HTTP
      - '81:81'   # Panel de Administración
      - '443:443' # HTTPS
    volumes:
      - ./npm_data:/data
      - ./npm_letsencrypt:/etc/letsencrypt

networks:
  default:
    name: nodo_proxy_network
